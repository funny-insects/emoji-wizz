name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: task lint

      - name: Typecheck
        run: task typecheck

      - name: Unit tests (with coverage)
        run: task test:coverage

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const { lines, functions, branches } = summary.total;
            const fmt = (v) => `${v.pct.toFixed(1)}%`;
            const icon = (v) => v.pct >= 80 ? '✅' : v.pct >= 60 ? '⚠️' : '❌';
            const body = [
              '## Coverage Report',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              `| Lines | ${icon(lines)} ${fmt(lines)} (${lines.covered}/${lines.total}) |`,
              `| Functions | ${icon(functions)} ${fmt(functions)} (${functions.covered}/${functions.total}) |`,
              `| Branches | ${icon(branches)} ${fmt(branches)} (${branches.covered}/${branches.total}) |`,
              '',
              '_No thresholds enforced — report only._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: task test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
