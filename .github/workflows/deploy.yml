# deploy.yml — CD pipeline: CI checks → build → deploy to Cloudflare Pages → smoke test + E2E
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN — Cloudflare API token with Pages:Edit permission
#
# Required GitHub repository variables:
#   CLOUDFLARE_ACCOUNT_ID — 32-character hex Cloudflare account ID
#   CLOUDFLARE_PROJECT_NAME — Cloudflare Pages project name (e.g. emoji-wizz)

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: task lint

      - name: Typecheck
        run: task typecheck

      - name: Unit tests
        run: task test

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ vars.CLOUDFLARE_PROJECT_NAME }}
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  post-deploy:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: deploy
    env:
      PROD_URL: ${{ needs.deploy.outputs.deployment-url }}

    steps:
      - name: Smoke test — wait for healthy deployment
        run: |
          curl --retry 30 --retry-delay 20 --retry-all-errors --max-time 600 -sf "${PROD_URL}"
          echo "Smoke test passed — production URL returned HTTP 200"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run production E2E tests
        run: npx playwright test --config playwright.prod.config.ts
