version: 1.0
runtime: nodejs22

build:
  commands:
    build:
      - npm ci
      - npm run build

run:
  command: npx serve -s dist -l 8080
  network:
    port: 8080
    env: APP_PORT
  env:
    - name: NODE_ENV
      value: production
  healthcheck:
    path: /
    interval: 10
    timeout: 5
    healthy_threshold: 1
    unhealthy_threshold: 5
